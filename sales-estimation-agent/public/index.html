<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CWS Technology — AI Sales Agent</title>
  <meta name="description" content="Get instant project estimates and schedule discovery calls.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* CWS Brand Colors */
      --cws-dark: #0D2665;
      --cws-navy: #112D73;
      --cws-blue: #2C64E7;
      --cws-blue-hover: #1A4FC2;
      --cws-blue-glow: rgba(44, 100, 231, 0.25);
      --cws-blue-soft: rgba(44, 100, 231, 0.08);
      --cws-blue-border: rgba(44, 100, 231, 0.2);
      --cws-purple: #5750FF;
      --cws-green: #3CEDB7;
      --cws-green-text: #3CEDB7;
      --cws-green-soft: rgba(60, 237, 183, 0.08);
      --cws-green-border: rgba(60, 237, 183, 0.2);
      --cws-orange: #ff6900;
      --cws-gray: #32373c;
      --cws-gray-light: #1a1d24;
      /* Surfaces */
      --bg: #0a0c12;
      --bg-header: rgba(10, 12, 18, 0.92);
      --surface: #12151e;
      --surface2: #181c28;
      --surface3: #1e2233;
      --surface4: #252a3a;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text2: #c8ccd8;
      --text3: #8b90a0;
      --muted: #5a5f72;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    html,
    body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── App Shell ────────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      background: linear-gradient(135deg, rgba(13, 38, 101, 0.6), rgba(17, 45, 115, 0.4));
      z-index: 10;
    }

    .header-avatar {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--cws-blue-glow);
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }

    .header-status {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cws-green);
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(60, 237, 183, 0.5);
    }

    .agent-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--cws-blue-soft);
      border: 1px solid var(--cws-blue-border);
      color: var(--cws-blue);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      display: none;
    }

    .agent-badge.visible {
      display: inline-block;
    }

    .agent-badge.negotiation {
      background: rgba(255, 105, 0, 0.08);
      border-color: rgba(255, 105, 0, 0.2);
      color: var(--cws-orange);
    }

    .agent-badge.booking {
      background: var(--cws-green-soft);
      border-color: var(--cws-green-border);
      color: var(--cws-green-text);
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--surface3);
      color: var(--text);
      border-color: var(--border-hover);
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ── Messages Area ────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      background: var(--bg);
    }

    .messages::-webkit-scrollbar {
      width: 3px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }

    /* ── Message Rows ─────────────────────────────────────────── */
    .msg-group {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      animation: msgIn 0.2s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-group.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-group.agent .msg-avatar {
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      color: #fff;
      box-shadow: 0 2px 6px var(--cws-blue-glow);
    }

    .msg-group.user .msg-avatar {
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text3);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      min-width: 48px;
      gap: 2px;
    }

    .msg-group.user .msg-body {
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg-group.agent .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-top-left-radius: 4px;
    }

    .msg-group.user .msg-bubble {
      background: linear-gradient(135deg, var(--cws-blue), #3570F5);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .msg-bubble strong {
      font-weight: 600;
      color: #fff;
    }

    .msg-bubble p {
      margin: 2px 0;
    }

    .msg-bubble p:first-child {
      margin-top: 0;
    }

    .msg-bubble p:last-child {
      margin-bottom: 0;
    }

    .msg-bubble ul,
    .msg-bubble ol {
      padding-left: 16px;
      margin: 4px 0;
    }

    .msg-bubble li {
      margin: 2px 0;
    }

    .msg-bubble code {
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--cws-green);
    }

    .msg-bubble a {
      color: var(--cws-blue);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .msg-bubble a:hover {
      opacity: 0.8;
    }

    .msg-bubble blockquote {
      border-left: 2px solid var(--cws-blue-border);
      padding-left: 10px;
      margin: 6px 0;
      color: var(--text3);
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      padding: 0 6px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .msg-group:hover .msg-time {
      opacity: 1;
    }

    /* ── Typing Indicator ─────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      align-items: flex-start;
    }

    .typing-dots {
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-top-left-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cws-blue);
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.16s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.32s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* ── Welcome Screen ───────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      padding: 32px 20px;
      text-align: center;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 4px 20px var(--cws-blue-glow);
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .welcome p {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.6;
      max-width: 320px;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 340px;
      margin-top: 8px;
    }

    .quick-action {
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .quick-action:hover {
      background: var(--surface3);
      border-color: var(--cws-blue-border);
      color: var(--text);
      transform: translateY(-1px);
    }

    .quick-action:active {
      transform: scale(0.98);
    }

    .quick-action-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--cws-blue-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cws-blue);
      font-weight: 700;
    }

    /* ── Slot Cards ───────────────────────────────────────────── */
    .slots-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      animation: msgIn 0.25s ease;
    }

    .slot-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--cws-blue-soft);
      border: 1px solid var(--cws-blue-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .slot-item:hover {
      background: rgba(44, 100, 231, 0.15);
      border-color: rgba(44, 100, 231, 0.4);
    }

    .slot-item:active {
      transform: scale(0.98);
    }

    .slot-item-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }

    .slot-item-body {
      flex: 1;
      min-width: 0;
    }

    .slot-item-day {
      font-size: 10px;
      font-weight: 600;
      color: var(--cws-blue);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .slot-item-time {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text2);
      margin-top: 1px;
    }

    .slot-item-cta {
      font-size: 11px;
      font-weight: 600;
      color: var(--cws-blue);
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(44, 100, 231, 0.12);
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .slot-item:hover .slot-item-cta {
      background: var(--cws-blue);
      color: #fff;
    }

    /* ── Estimate Card ────────────────────────────────────────── */
    .estimate-card {
      background: var(--cws-green-soft);
      border: 1px solid var(--cws-green-border);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 8px;
      animation: msgIn 0.25s ease;
      max-width: 320px;
    }

    .est-header {
      font-weight: 600;
      font-size: 12px;
      color: var(--cws-green-text);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .est-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12.5px;
      color: var(--text3);
    }

    .est-row:last-of-type {
      border: none;
    }

    .est-row .price {
      font-weight: 500;
      color: var(--text2);
      font-size: 12px;
    }

    .est-divider {
      height: 1px;
      background: var(--cws-green-border);
      margin: 6px 0;
    }

    .est-total {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      color: var(--cws-green-text);
      margin-top: 2px;
    }

    .est-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ── Booking Confirmation ─────────────────────────────────── */
    .booking-card {
      background: var(--cws-green-soft);
      border: 1px solid var(--cws-green-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 8px;
      text-align: center;
      animation: msgIn 0.25s ease;
    }

    .booking-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .booking-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--cws-green-text);
    }

    .booking-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    .booking-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .booking-link:hover {
      opacity: 0.85;
    }

    /* ── Project Card ─────────────────────────────────────────── */
    .project-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      max-width: 320px;
    }

    .project-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: default;
      transition: all 0.15s;
      text-decoration: none;
      display: block;
      animation: msgIn 0.25s ease;
    }

    .project-card:hover {
      background: var(--surface3);
      border-color: var(--cws-blue-border);
    }

    .project-card.clickable {
      cursor: pointer;
    }

    .project-card.clickable:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 12px var(--cws-blue-glow);
      border-color: var(--cws-blue);
    }

    .pc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .pc-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--cws-blue);
    }

    .pc-cost {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      white-space: nowrap;
    }

    .pc-desc {
      font-size: 11.5px;
      color: var(--text3);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .pc-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pc-impact {
      font-size: 10.5px;
      color: var(--cws-green-text);
      font-weight: 500;
    }

    .pc-link {
      font-size: 10.5px;
      color: var(--cws-blue);
      font-weight: 500;
      text-decoration: none;
    }

    .pc-link:hover {
      text-decoration: underline;
    }

    /* ── Input Area ───────────────────────────────────────────── */
    .input-area {
      padding: 8px 12px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      background: rgba(10, 12, 18, 0.92);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 6px 6px 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--cws-blue-border);
      box-shadow: 0 0 0 2px rgba(44, 100, 231, 0.08);
    }

    .input-attach {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .input-attach:hover {
      background: var(--surface3);
      color: var(--text3);
    }

    .input-attach svg {
      width: 16px;
      height: 16px;
    }

    .input-mic {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .input-mic:hover {
      background: var(--surface3);
      color: var(--text3);
    }

    .input-mic.recording {
      color: #ef4444;
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .input-mic svg {
      width: 16px;
      height: 16px;
    }

    .input-text {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      max-height: 100px;
      scrollbar-width: none;
      padding: 5px 2px;
    }

    .input-text::placeholder {
      color: var(--muted);
    }

    .input-text::-webkit-scrollbar {
      display: none;
    }

    .input-send {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--cws-blue), var(--cws-purple));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      box-shadow: 0 2px 8px var(--cws-blue-glow);
    }

    .input-send:hover {
      opacity: 0.9;
    }

    .input-send:active {
      transform: scale(0.93);
    }

    .input-send svg {
      width: 15px;
      height: 15px;
      fill: white;
    }

    .input-footer {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 5px;
      opacity: 0.6;
    }

    input[type="file"] {
      display: none;
    }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      padding: 8px 16px;
      border-radius: var(--radius);
      background: var(--surface3);
      border: 1px solid var(--border-hover);
      color: var(--text2);
      font-size: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: toastIn 0.2s ease forwards;
      max-width: 90vw;
      white-space: nowrap;
    }

    @keyframes toastIn {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .app {
        max-width: 100%;
        border-left: none;
        border-right: none;
      }

      .quick-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-avatar" aria-hidden="true">A</div>
      <div class="header-info">
        <div class="header-title" id="header-title">CWS Technology</div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span>Online</span>
          <span id="agent-badge" class="agent-badge" role="status"></span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="newChat()" title="New chat" aria-label="Start new conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">A</div>
        <h2>Hi, I'm Amit</h2>
        <p>I can help you plan and estimate your project. What are you looking to do?</p>
        <div class="quick-actions">
          <button class="quick-action" onclick="send('Build a new product')">
            <span class="quick-action-icon">+</span> Build a new product
          </button>
          <button class="quick-action" onclick="send('Improve an existing system')">
            <span class="quick-action-icon">^</span> Improve existing system
          </button>
          <button class="quick-action" onclick="send('Fix an issue')">
            <span class="quick-action-icon">!</span> Fix an issue
          </button>
          <button class="quick-action" onclick="send('Just exploring an idea')">
            <span class="quick-action-icon">~</span> Exploring an idea
          </button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <button class="input-attach" onclick="document.getElementById('file-input').click()" title="Attach file"
          aria-label="Attach a file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
          </svg>
        </button>
        <textarea class="input-text" id="input" placeholder="Describe your project..." rows="1"
          aria-label="Message input"></textarea>
        <button class="input-mic" onclick="toggleVoice()" id="mic-btn" title="Voice input" aria-label="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <button class="input-send" onclick="send()" id="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
      <input type="file" id="file-input" accept=".pdf,.txt,.csv,.md" onchange="handleFileUpload(event)">
      <div class="input-footer">CWS Technology</div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const THREAD_KEY = 'sa_thread_v2';
    let threadId = localStorage.getItem(THREAD_KEY) || ('t_' + Math.random().toString(36).slice(2) + Date.now());
    localStorage.setItem(THREAD_KEY, threadId);
    let busy = false;

    // ── Init ────────────────────────────────────────────────────
    fetch(API_URL + '/health').then(r => r.json()).then(d => {
      if (d.business) {
        document.getElementById('header-title').textContent = d.business;
        document.title = d.business + ' — Sales Agent';
      }
    }).catch(() => { });

    // ── Markdown renderer ───────────────────────────────────────
    function md(text) {
      let h = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      h = h.replace(/^&gt;\s+(.+)/gm, '<blockquote>$1</blockquote>');
      h = h.replace(/^### (.+)$/gm, '<p><strong>$1</strong></p>');
      h = h.replace(/^## (.+)$/gm, '<p><strong>$1</strong></p>');

      const lines = h.split('\n');
      const out = [];
      let ul = false, ol = false;
      for (const line of lines) {
        const ulm = line.match(/^[-*]\s+(.+)/);
        const olm = line.match(/^\d+\.\s+(.+)/);
        if (ulm) {
          if (!ul) { out.push('<ul>'); ul = true; }
          if (ol) { out.push('</ol>'); ol = false; }
          out.push('<li>' + ulm[1] + '</li>');
        } else if (olm) {
          if (!ol) { out.push('<ol>'); ol = true; }
          if (ul) { out.push('</ul>'); ul = false; }
          out.push('<li>' + olm[1] + '</li>');
        } else {
          if (ul) { out.push('</ul>'); ul = false; }
          if (ol) { out.push('</ol>'); ol = false; }
          if (line.trim()) out.push('<p>' + line + '</p>');
        }
      }
      if (ul) out.push('</ul>');
      if (ol) out.push('</ol>');
      return out.filter(Boolean).join('');
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollBottom() {
      requestAnimationFrame(() => {
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
      });
    }

    // ── Create message element ──────────────────────────────────
    function addMsg(role, text, time) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const group = document.createElement('div');
      group.className = 'msg-group ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = role === 'agent' ? 'A' : 'U';

      const body = document.createElement('div');
      body.className = 'msg-body';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'agent') {
        bubble.innerHTML = md(text);
      } else {
        bubble.textContent = text;
      }

      const ts = document.createElement('div');
      ts.className = 'msg-time';
      ts.textContent = time || now();

      body.appendChild(bubble);
      body.appendChild(ts);
      group.appendChild(avatar);
      group.appendChild(body);
      container.appendChild(group);
      scrollBottom();
      return body;
    }

    // ── Typing ──────────────────────────────────────────────────
    function showTyping() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.id = 'typing';
      el.innerHTML = `
        <div class="msg-avatar" aria-hidden="true">A</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      container.appendChild(el);
      scrollBottom();
    }

    function hideTyping() {
      document.getElementById('typing')?.remove();
    }

    // ── Agent badge ─────────────────────────────────────────────
    function setAgent(agent) {
      const badge = document.getElementById('agent-badge');
      if (!agent) { badge.className = 'agent-badge'; return; }
      const labels = {
        estimation: 'Estimating',
        negotiation: 'Negotiating',
        booking: 'Booking'
      };
      badge.textContent = labels[agent] || agent;
      badge.className = 'agent-badge visible ' + agent;
    }

    // ── Slot Cards ──────────────────────────────────────────────
    function renderSlots(slots, container) {
      const wrap = document.createElement('div');
      wrap.className = 'slots-wrap';

      slots.forEach(slot => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');
        item.innerHTML = `
          <div class="slot-item-icon">C</div>
          <div class="slot-item-body">
            <div class="slot-item-day">${slot.day}</div>
            <div class="slot-item-time">${slot.date} at ${slot.time}</div>
          </div>
          <div class="slot-item-cta">Book</div>`;

        const selectSlot = () => {
          if (busy) return;
          wrap.querySelectorAll('.slot-item').forEach(s => {
            s.style.opacity = '0.35';
            s.style.pointerEvents = 'none';
          });
          item.style.opacity = '1';
          item.style.borderColor = 'var(--cws-blue)';
          send(slot.day + ', ' + slot.date + ' at ' + slot.time);
        };

        item.onclick = selectSlot;
        item.onkeydown = e => { if (e.key === 'Enter') selectSlot(); };
        wrap.appendChild(item);
      });

      container.appendChild(wrap);
      scrollBottom();
    }

    // ── Estimate Card ───────────────────────────────────────────
    function renderEstimate(est, container) {
      const card = document.createElement('div');
      card.className = 'estimate-card';
      const cur = est.currency || '$';
      const fmt = n => cur === '$' ? '$' + Number(n).toLocaleString() : cur + ' ' + Number(n).toLocaleString();

      const items = (est.items || []).map(i =>
        '<div class="est-row"><span>' + i.name + '</span><span class="price">' +
        fmt(i.minPrice) + ' - ' + fmt(i.maxPrice) + '</span></div>'
      ).join('');

      card.innerHTML =
        '<div class="est-header">Project Estimate</div>' +
        items +
        '<div class="est-divider"></div>' +
        '<div class="est-total"><span>Total</span><span>' + fmt(est.totalMin) + ' - ' + fmt(est.totalMax) + '</span></div>' +
        '<div class="est-meta">' +
        'Timeline: ' + (est.timeline || 'TBD') + '<br>' +
        'Valid for ' + (est.validDays || 30) + ' days<br>' +
        (est.policies?.payment || '50% advance, 50% on delivery') +
        '</div>' +
        '<div style="margin-top:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;color:var(--text3);line-height:1.5">' +
        'Please note: This is a high-level estimate, not the final one. The final estimate will be provided after a discussion with our Associate.' +
        '</div>';

      container.appendChild(card);
      scrollBottom();
    }

    // ── Booking Confirmation ────────────────────────────────────
    function renderBooking(bk, container) {
      if (!bk.success) return;
      const card = document.createElement('div');
      card.className = 'booking-card';
      let links = '';
      if (bk.meetLink) {
        links += '<a class="booking-link" href="' + bk.meetLink + '" target="_blank" rel="noopener">Join Meeting</a> ';
      }
      if (bk.link) {
        links += '<a class="booking-link" href="' + bk.link + '" target="_blank" rel="noopener">View Event</a>';
      }
      card.innerHTML =
        '<div class="booking-icon">Done</div>' +
        '<div class="booking-title">Meeting Booked</div>' +
        '<div class="booking-sub">Check your email for the calendar invite</div>' +
        links;

      container.appendChild(card);
      scrollBottom();
    }

    // ── Project Cards ────────────────────────────────────────────
    function renderProjects(projects, container) {
      if (!projects || !projects.length) return;
      const wrap = document.createElement('div');
      wrap.className = 'project-cards';

      projects.forEach(p => {
        const card = document.createElement('div');
        const hasUrl = !!p.url;
        card.className = 'project-card' + (hasUrl ? ' clickable' : '');

        let html = '<div class="pc-header"><div class="pc-name">' + esc(p.name) + '</div>';
        if (p.cost) html += '<div class="pc-cost">$' + Number(p.cost).toLocaleString() + '</div>';
        html += '</div>';

        if (p.description || p.scope) html += '<div class="pc-desc">' + esc(p.description || p.scope || '') + '</div>';

        html += '<div class="pc-footer">';
        if (p.impact) html += '<div class="pc-impact">' + esc(p.impact) + '</div>';
        if (hasUrl) html += '<a class="pc-link" href="' + esc(p.url) + '" target="_blank" rel="noopener">View Project &rarr;</a>';
        html += '</div>';

        card.innerHTML = html;
        if (hasUrl) card.onclick = () => window.open(p.url, '_blank');
        wrap.appendChild(card);
      });

      container.appendChild(wrap);
      scrollBottom();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Toast ───────────────────────────────────────────────────
    function showToast(html, duration) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = html;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.2s';
        setTimeout(() => toast.remove(), 200);
      }, duration || 3000);
    }

    // ── Send message ────────────────────────────────────────────
    async function send(preset) {
      const input = document.getElementById('input');
      const msg = (preset || input.value || '').trim();
      if (!msg || busy) return;
      if (!preset) { input.value = ''; input.style.height = 'auto'; }

      addMsg('user', msg);
      busy = true;
      showTyping();

      try {
        const res = await fetch(API_URL + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread_id: threadId, message: msg }),
        });
        const data = await res.json();
        hideTyping();

        if (data.reply) {
          const body = addMsg('agent', data.reply);
          if (data.estimate) renderEstimate(data.estimate, body);
          if (data.projects && data.projects.length > 0) renderProjects(data.projects, body);
          if (data.slots && data.slots.length > 0) renderSlots(data.slots, body);
          if (data.booking && data.booking.success) renderBooking(data.booking, body);
        }
        if (data.agent) setAgent(data.agent);
      } catch (err) {
        console.error('Chat error:', err);
        hideTyping();
        addMsg('agent', "Something went wrong. Please try again.");
      }

      busy = false;
      if (!preset) document.getElementById('input').focus();
      scrollBottom();
    }

    // ── File Upload ─────────────────────────────────────────────
    async function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';

      showToast('Uploading ' + file.name + '...', 5000);

      try {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch(API_URL + '/api/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (data.success) {
          showToast(file.name + ' uploaded (' + data.document.chunks + ' sections indexed)', 3000);
          send('I just uploaded a document: ' + file.name + '. Please review it and use it for my project estimation.');
        } else {
          showToast('Upload failed: ' + data.error, 4000);
        }
      } catch {
        showToast('Upload failed. Please try again.', 3000);
      }
    }

    // ── New Chat ────────────────────────────────────────────────
    function newChat() {
      threadId = 't_' + Math.random().toString(36).slice(2) + Date.now();
      localStorage.setItem(THREAD_KEY, threadId);
      setAgent(null);

      const messages = document.getElementById('messages');
      messages.innerHTML = '';

      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcome';
      welcome.innerHTML =
        '<div class="welcome-icon">A</div>' +
        '<h2>Hi, I\'m Amit</h2>' +
        '<p>I can help you plan and estimate your project. What are you looking to do?</p>' +
        '<div class="quick-actions">' +
        '<button class="quick-action" onclick="send(\'Build a new product\')">' +
        '<span class="quick-action-icon">+</span> Build a new product</button>' +
        '<button class="quick-action" onclick="send(\'Improve an existing system\')">' +
        '<span class="quick-action-icon">^</span> Improve existing system</button>' +
        '<button class="quick-action" onclick="send(\'Fix an issue\')">' +
        '<span class="quick-action-icon">!</span> Fix an issue</button>' +
        '<button class="quick-action" onclick="send(\'Just exploring an idea\')">' +
        '<span class="quick-action-icon">~</span> Exploring an idea</button>' +
        '</div>';

      messages.appendChild(welcome);
    }

    // ── Input events ────────────────────────────────────────────
    const input = document.getElementById('input');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    // ── Voice Input (Web Speech API) ─────────────────────────────
    let recognition = null;
    let isRecording = false;

    function toggleVoice() {
      if (isRecording) {
        stopVoice();
      } else {
        startVoice();
      }
    }

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showToast('Voice input not supported in this browser', 3000);
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-IN';

      isRecording = true;
      const micBtn = document.getElementById('mic-btn');
      micBtn.classList.add('recording');
      input.placeholder = 'Listening...';

      let finalTranscript = '';

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interim += event.results[i][0].transcript;
          }
        }
        input.value = finalTranscript + interim;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('recording');
        input.placeholder = 'Describe your project...';
        if (finalTranscript.trim()) {
          input.focus();
        }
      };

      recognition.onerror = (event) => {
        isRecording = false;
        micBtn.classList.remove('recording');
        input.placeholder = 'Describe your project...';
        if (event.error !== 'no-speech') {
          showToast('Voice error: ' + event.error, 3000);
        }
      };

      recognition.start();
    }

    function stopVoice() {
      if (recognition) {
        recognition.stop();
      }
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      input.placeholder = 'Describe your project...';
    }
  </script>
</body>

</html>
